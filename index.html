<!DOCTYPE html>
<html>
<head>
    <title>Student Data Entry Form</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f4f4f4;
        }
        .container {
            width: 400px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }
        h2 {
            text-align: center;
        }
        input, select {
            width: 100%;
            padding: 8px;
            margin: 8px 0;
        }
        .radio-group {
            margin: 10px 0;
        }
        button {
            width: 100%;
            padding: 10px;
            background: blue;
            color: white;
            border: none;
            border-radius: 5px;
        }
        button:hover {
            background: darkblue;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Student Entry Form</h2>

    <form>
        <label>Full Name</label>
        <input type="text" required>

        <label>Email</label>
        <input type="email" required>

        <label>Date of Birth</label>
        <input type="date">

        <label>Program</label>
        <input type="text">

        <label>Semester</label>
        <input type="number">

        <label>Department</label>
        <input type="text">

        <label>CGPA</label>
        <input type="number" step="0.01">

        <div class="radio-group">
            <label>Student Type:</label><br>
            <input type="radio" name="type"> Full-Time
            <input type="radio" name="type"> Part-Time
        </div>

        <button type="submit">Submit</button>
    </form>
</div>

</body>
</html>
